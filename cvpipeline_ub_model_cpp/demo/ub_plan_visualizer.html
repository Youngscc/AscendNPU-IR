<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CVPipeline UB Plan Visualizer v2</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5d687a;
      --line: #d8dee8;
      --accent: #167c80;
      --danger: #c0392b;
      --ok: #237a45;
      --warn: #9a6a00;
      --track: #ecf0f4;
      --shadow: 0 10px 28px rgba(24, 35, 50, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 20px auto 36px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      max-width: 860px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 340px;
    }

    button, .file-button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
      min-height: 36px;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    input[type="file"] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      font-size: 15px;
      line-height: 1.2;
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 74px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric .value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .metric.ok .value { color: var(--ok); }
    .metric.danger .value { color: var(--danger); }
    .metric.warn .value { color: var(--warn); }

    .capacity {
      padding: 0 14px 14px;
    }

    .capacity-track {
      height: 16px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .capacity-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
    }

    .capacity-fill.overflow { background: var(--danger); }

    .kv {
      display: grid;
      grid-template-columns: minmax(120px, 38%) 1fr;
      gap: 6px 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
    }

    .kv div:nth-child(odd) { color: var(--muted); }
    .kv div:nth-child(even) {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .input-panel textarea {
      display: block;
      width: calc(100% - 28px);
      height: 240px;
      margin: 14px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      background: #fbfcfd;
    }

    .input-actions {
      display: flex;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .status {
      color: var(--muted);
      padding: 0 14px 14px;
      min-height: 24px;
    }

    .viz {
      padding: 14px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 220px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    .chart-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    svg {
      display: block;
      min-width: 760px;
      width: 100%;
    }

    svg#planChart {
      height: 480px;
    }

    .axis text {
      fill: var(--muted);
      font-size: 11px;
    }

    .axis line, .axis path, .gridline {
      stroke: var(--line);
      shape-rendering: crispEdges;
    }

    .buffer-rect {
      stroke: rgba(23, 32, 51, 0.35);
      stroke-width: 1;
    }

    .buffer-label {
      fill: #111827;
      font-size: 11px;
      pointer-events: none;
    }

    .peak-line {
      stroke: var(--danger);
      stroke-width: 2;
      stroke-dasharray: 6 4;
    }

    .peak-label {
      fill: var(--danger);
      font-size: 12px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #f8fafc;
      position: sticky;
      top: 0;
    }

    td.name {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .table-wrap {
      max-height: 320px;
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      main { width: min(100vw - 20px, 900px); }
      header { display: block; }
      .toolbar { justify-content: flex-start; margin-top: 12px; min-width: 0; }
      .grid { grid-template-columns: 1fr; }
      svg { height: 430px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CVPipeline UB Plan Visualizer</h1>
        <div class="subtitle">
          Inspect the exact local UB plan from the lightweight model: peak,
          capacity, buffer offsets, and live intervals.
        </div>
      </div>
      <div class="toolbar">
        <label class="file-button" title="Load a JSON file produced by plan_precvpipeline_ub.py">
          Open JSON
          <input id="fileInput" type="file" accept=".json,application/json,text/plain">
        </label>
        <button id="sampleButton" type="button">Sample</button>
        <button id="clearButton" type="button">Clear</button>
      </div>
    </header>

    <section class="grid">
      <aside>
        <section class="panel">
          <h2>Summary</h2>
          <div class="summary" id="summary"></div>
          <div class="capacity">
            <div class="capacity-track" title="required bits over capacity bits">
              <div class="capacity-fill" id="capacityFill"></div>
            </div>
          </div>
          <div class="kv" id="metadata"></div>
        </section>

        <section class="panel input-panel" style="margin-top: 16px;">
          <h2>Input</h2>
          <textarea id="inputText" spellcheck="false" placeholder="Paste JSON from plan_precvpipeline_ub.py --format=json, or paste the text table output."></textarea>
          <div class="input-actions">
            <button id="renderButton" class="primary" type="button">Render</button>
            <button id="copySampleButton" type="button">Copy Sample</button>
          </div>
          <div class="status" id="status"></div>
        </section>
      </aside>

      <section>
        <section class="panel">
          <h2>UB Offset x Lifetime</h2>
          <div class="viz">
            <div class="legend" id="legend"></div>
            <div class="chart-wrap">
              <svg id="chart" role="img" aria-label="UB memory plan chart"></svg>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top: 16px;">
          <h2>UB Utilization</h2>
          <div class="viz">
            <div class="chart-wrap">
              <svg id="utilChart" role="img" aria-label="UB utilization chart"></svg>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top: 16px;">
          <h2>Buffer Plan</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Extent</th>
                  <th>Offset</th>
                  <th>Live Range</th>
                  <th>End Byte</th>
                </tr>
              </thead>
              <tbody id="planTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const sample = {
      schema_version: 1,
      input: { pre_cvpipeline_ir: "sample/before_cvpipeline_generic.mlir" },
      options: {
        cvpipeline: {
          disable_pipelining: false,
          pipeline_depth: -1,
          enable_preload: false,
          enable_lazy_loading: false
        },
        suffix_planmemory: {
          enable_auto_multi_buffer: false,
          local_multi_buffer_strategy: "no-limit",
          mix_multi_buffer_strategy: "no-limit",
          random_seed: 0,
          restrict_inplace_as_isa: false
        }
      },
      result: {
        precision: "before_cvpipeline_model",
        success: true,
        overflow: false,
        selected_seed: 0,
        restrict_inplace_as_isa: false,
        peak_bits: 640,
        required_bits: 768,
        capacity_bits: 1572864,
        plan: [
          { name: "%base_0", extent_bits: 256, offset_bytes: 0, alloc_time: 8, free_time: 14 },
          { name: "%base_1", extent_bits: 128, offset_bytes: 32, alloc_time: 11, free_time: 16 },
          { name: "%base_2", extent_bits: 128, offset_bytes: 64, alloc_time: 14, free_time: 18 }
        ]
      }
    };

    const palette = [
      "#58a6a6", "#d98e4a", "#7a9c3e", "#8d6ccf", "#c95f6a",
      "#4f8bc9", "#b77b35", "#4f9d69", "#c45b94", "#6877c9",
      "#9a8b2e", "#5c9db2"
    ];

    const inputText = document.getElementById("inputText");
    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");

    document.getElementById("sampleButton").addEventListener("click", () => render(sample));
    document.getElementById("copySampleButton").addEventListener("click", () => {
      inputText.value = JSON.stringify(sample, null, 2);
      status.textContent = "Sample JSON copied into the input box.";
    });
    document.getElementById("clearButton").addEventListener("click", clearView);
    document.getElementById("renderButton").addEventListener("click", () => {
      try {
        render(parseInput(inputText.value));
      } catch (error) {
        status.textContent = error.message;
      }
    });
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;
      inputText.value = await file.text();
      try {
        render(parseInput(inputText.value));
      } catch (error) {
        status.textContent = error.message;
      }
    });

    function parseInput(text) {
      const trimmed = text.trim();
      if (!trimmed) throw new Error("Paste JSON or text output first.");
      if (trimmed.startsWith("{")) return JSON.parse(trimmed);
      return parseTextOutput(trimmed);
    }

    function parseTextOutput(text) {
      const lines = text.split(/\r?\n/);
      const result = { plan: [] };
      let inPlan = false;
      for (const line of lines) {
        if (!line.trim()) continue;
        const parts = line.split("\t");
        if (parts.join("\t") === "name\textent_bits\toffset_bytes\talloc_time\tfree_time") {
          inPlan = true;
          continue;
        }
        if (inPlan) {
          if (parts.length < 5) continue;
          result.plan.push({
            name: parts[0],
            extent_bits: Number(parts[1]),
            offset_bytes: Number(parts[2]),
            alloc_time: Number(parts[3]),
            free_time: Number(parts[4])
          });
          continue;
        }
        if (parts.length >= 2) {
          const key = parts[0];
          const value = parts.slice(1).join("\t");
          if (["peak_bits", "required_bits", "capacity_bits", "selected_seed"].includes(key)) {
            result[key] = Number(value);
          } else if (["success", "overflow", "restrict_inplace_as_isa"].includes(key)) {
            result[key] = value === "true";
          } else if (key === "precision") {
            result[key] = value;
          }
        }
      }
      return { schema_version: 1, result };
    }

    function normalize(data) {
      const result = data.result || data;
      if (!Array.isArray(result.plan)) {
        throw new Error("Input does not contain result.plan.");
      }
      const plan = result.plan.map((buffer, index) => ({
        name: String(buffer.name ?? `buffer_${index}`),
        extentBits: Number(buffer.extent_bits ?? buffer.extentBits ?? 0),
        offsetBytes: Number(buffer.offset_bytes ?? buffer.offsetBytes ?? 0),
        allocTime: Number(buffer.alloc_time ?? buffer.allocTime ?? 0),
        freeTime: Number(buffer.free_time ?? buffer.freeTime ?? 0)
      })).filter(buffer => Number.isFinite(buffer.extentBits) &&
                           Number.isFinite(buffer.offsetBytes) &&
                           Number.isFinite(buffer.allocTime) &&
                           Number.isFinite(buffer.freeTime));
      if (plan.length === 0) throw new Error("The plan table is empty.");
      return { data, result, plan };
    }

    function render(data) {
      const model = normalize(data);
      renderSummary(model);
      renderChart(model);
      renderTable(model.plan);
      renderUtilChart(model.result, model.plan);
      inputText.value = JSON.stringify(data, null, 2);
      status.textContent = `Rendered ${model.plan.length} buffers.`;
    }

    function clearView() {
      inputText.value = "";
      status.textContent = "";
      document.getElementById("summary").innerHTML = "";
      document.getElementById("metadata").innerHTML = "";
      document.getElementById("legend").innerHTML = "";
      document.getElementById("planTable").innerHTML = "";
      document.getElementById("capacityFill").style.width = "0%";
      document.getElementById("chart").innerHTML = "";
    }

    function renderSummary({ data, result, plan }) {
      const requiredBits = Number(result.required_bits ?? result.requiredBits ?? 0);
      const peakBits = Number(result.peak_bits ?? result.peakBits ?? requiredBits);
      const capacityBits = Number(result.capacity_bits ?? result.capacityBits ?? 0);
      const overflow = Boolean(result.overflow);
      const success = result.success !== false && !overflow;
      const usage = capacityBits > 0 ? requiredBits / capacityBits : 0;
      const summary = document.getElementById("summary");
      summary.innerHTML = "";
      summary.append(
        metric("Status", overflow ? "Overflow" : success ? "Success" : "Blocked", overflow ? "danger" : success ? "ok" : "warn"),
        metric("Peak", formatBits(peakBits), overflow ? "danger" : "ok"),
        metric("Required", formatBits(requiredBits), overflow ? "danger" : ""),
        metric("Buffers", String(plan.length), "")
      );
      const fill = document.getElementById("capacityFill");
      fill.style.width = `${Math.min(100, Math.max(0, usage * 100))}%`;
      fill.classList.toggle("overflow", overflow);

      const inputPath = data.input && data.input.pre_cvpipeline_ir ? data.input.pre_cvpipeline_ir : "";
      const metadata = document.getElementById("metadata");
      metadata.innerHTML = "";
      const rows = [
        ["Precision", result.precision ?? ""],
        ["Seed", result.selected_seed ?? ""],
        ["Restrict Inplace", result.restrict_inplace_as_isa ?? ""],
        ["Capacity", formatBits(capacityBits)],
        ["Usage", capacityBits > 0 ? `${(usage * 100).toFixed(4)}%` : ""],
        ["Input", inputPath]
      ];
      for (const [key, value] of rows) {
        const k = document.createElement("div");
        const v = document.createElement("div");
        k.textContent = key;
        v.textContent = String(value);
        metadata.append(k, v);
      }
    }

    function metric(label, value, tone) {
      const node = document.createElement("div");
      node.className = `metric ${tone || ""}`;
      const labelNode = document.createElement("div");
      labelNode.className = "label";
      labelNode.textContent = label;
      const valueNode = document.createElement("div");
      valueNode.className = "value";
      valueNode.textContent = value;
      node.append(labelNode, valueNode);
      return node;
    }

    function renderChart({ result, plan }) {
      const svg = document.getElementById("chart");
      svg.innerHTML = "";
      const width = Math.max(760, svg.clientWidth || 920);
      const height = 480;
      const margin = { top: 24, right: 65, bottom: 46, left: 70 };
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const minTime = Math.min(...plan.map(buffer => buffer.allocTime));
      const maxTime = Math.max(...plan.map(buffer => buffer.freeTime), minTime + 1);
      const maxEndByte = Math.max(...plan.map(buffer => buffer.offsetBytes + bitsToBytes(buffer.extentBits)));
      const requiredBits = Number(result.required_bits ?? result.requiredBits ?? maxEndByte * 8);

      const allTimes = [...new Set([
        minTime,
        ...plan.map(b => b.allocTime),
        ...plan.map(b => b.freeTime),
        maxTime
      ])].sort((a, b) => a - b);

      const events = [];
      plan.forEach(buffer => {
        events.push({ time: buffer.allocTime, type: 'alloc', offset: buffer.offsetBytes, extent: bitsToBytes(buffer.extentBits) });
        events.push({ time: buffer.freeTime, type: 'free', offset: buffer.offsetBytes, extent: bitsToBytes(buffer.extentBits) });
      });
      events.sort((a, b) => {
        if (a.time !== b.time) return a.time - b.time;
        return a.type === 'alloc' ? -1 : 1;
      });

      const activeRanges = [];
      const utilPoints = [];
      let lastTime = minTime;

      const mergeRanges = () => {
        if (activeRanges.length === 0) return 0;
        activeRanges.sort((a, b) => a.start - b.start);
        let total = 0;
        let lastEnd = activeRanges[0].start;
        for (const r of activeRanges) {
          if (r.start >= lastEnd) {
            total += r.end - r.start;
            lastEnd = r.end;
          } else if (r.end > lastEnd) {
            total += r.end - lastEnd;
            lastEnd = r.end;
          }
        }
        return total;
      };

      let currentTime = minTime;
      let i = 0;
      while (i < events.length) {
        const evt = events[i];
        if (evt.time > currentTime) {
          utilPoints.push({ time: currentTime, bytes: mergeRanges() });
          currentTime = evt.time;
        }
        const sameTimeEvts = [];
        while (i < events.length && events[i].time === currentTime) {
          sameTimeEvts.push(events[i]);
          i++;
        }
        sameTimeEvts.filter(e => e.type === 'alloc').forEach(e => {
          activeRanges.push({ start: e.offset, end: e.offset + e.extent });
        });
        utilPoints.push({ time: currentTime, bytes: mergeRanges() });
        sameTimeEvts.filter(e => e.type === 'free').forEach(e => {
          const idx = activeRanges.findIndex(r => r.start === e.offset && r.end === e.offset + e.extent);
          if (idx !== -1) activeRanges.splice(idx, 1);
        });
      }
      utilPoints.push({ time: maxTime, bytes: 0 });

      const maxUtil = Math.max(...utilPoints.map(p => p.bytes), 1);
      const yMax = Math.max(maxEndByte, bitsToBytes(requiredBits), 1);

      const capacityBits = Number(result.capacity_bits ?? result.capacityBits ?? 0);
      const capacityBytes = bitsToBytes(capacityBits);
      const utilToPercent = bytes => (bytes / capacityBytes) * 100;

      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const x = time => margin.left + ((time - minTime) / Math.max(1, maxTime - minTime)) * innerWidth;
      const y = byte => margin.top + innerHeight - (byte / yMax) * innerHeight;
      const y2 = percent => margin.top + innerHeight - (percent / 100) * innerHeight;

      const group = element("g", {});
      svg.append(group);

      for (let index = 0; index <= 5; ++index) {
        const byte = (yMax / 5) * index;
        group.append(element("line", {
          class: "gridline",
          x1: margin.left,
          y1: y(byte),
          x2: width - margin.right,
          y2: y(byte)
        }));
        const label = element("text", {
          x: margin.left - 10,
          y: y(byte) + 4,
          "text-anchor": "end",
          fill: "var(--muted)",
          "font-size": 11
        });
        label.textContent = formatBytes(byte);
        group.append(label);
      }

      for (let index = 0; index <= 6; ++index) {
        const time = minTime + ((maxTime - minTime) / 6) * index;
        group.append(element("line", {
          class: "gridline",
          x1: x(time),
          y1: margin.top,
          x2: x(time),
          y2: margin.top + innerHeight
        }));
        const label = element("text", {
          x: x(time),
          y: height - 18,
          "text-anchor": "middle",
          fill: "var(--muted)",
          "font-size": 11
        });
        label.textContent = String(Math.round(time));
        group.append(label);
      }

      const yAxis = element("text", {
        x: 18,
        y: margin.top + innerHeight / 2,
        transform: `rotate(-90 18 ${margin.top + innerHeight / 2})`,
        "text-anchor": "middle",
        fill: "var(--muted)",
        "font-size": 12
      });
      yAxis.textContent = "UB offset";
      group.append(yAxis);
      const xAxis = element("text", {
        x: margin.left + innerWidth / 2,
        y: height - 4,
        "text-anchor": "middle",
        fill: "var(--muted)",
        "font-size": 12
      });
      xAxis.textContent = "PlanMemory operation time";
      group.append(xAxis);

      plan.forEach((buffer, index) => {
        const top = buffer.offsetBytes + bitsToBytes(buffer.extentBits);
        const rect = element("rect", {
          class: "buffer-rect",
          x: x(buffer.allocTime),
          y: y(top),
          width: Math.max(3, x(buffer.freeTime) - x(buffer.allocTime)),
          height: Math.max(3, y(buffer.offsetBytes) - y(top)),
          rx: 3,
          fill: palette[index % palette.length]
        });
        rect.append(element("title", {}));
        rect.querySelector("title").textContent =
          `${buffer.name}\n${formatBits(buffer.extentBits)} at ${formatBytes(buffer.offsetBytes)}\n${buffer.allocTime} -> ${buffer.freeTime}`;
        group.append(rect);

        if (x(buffer.freeTime) - x(buffer.allocTime) > 54 &&
            y(buffer.offsetBytes) - y(top) > 16) {
          const label = element("text", {
            class: "buffer-label",
            x: x(buffer.allocTime) + 5,
            y: y(top) + 14
          });
          label.textContent = buffer.name;
          group.append(label);
        }
      });

      const peakByte = bitsToBytes(requiredBits);
      group.append(element("line", {
        class: "peak-line",
        x1: margin.left,
        y1: y(peakByte),
        x2: width - margin.right,
        y2: y(peakByte)
      }));
      const requiredLabel = element("text", {
        class: "peak-label",
        x: width - margin.right - 4,
        y: y(peakByte) - 6,
        "text-anchor": "end"
      });
      requiredLabel.textContent = `required ${formatBits(requiredBits)}`;
      group.append(requiredLabel);

      const legend = document.getElementById("legend");
      legend.innerHTML = "";
      plan.slice(0, 24).forEach((buffer, index) => {
        const item = document.createElement("span");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = palette[index % palette.length];
        const name = document.createElement("span");
        name.textContent = buffer.name;
        item.append(swatch, name);
        legend.append(item);
      });
      if (plan.length > 24) {
        const more = document.createElement("span");
        more.textContent = `+${plan.length - 24} more`;
        legend.append(more);
      }
    }

    function renderTable(plan) {
      const tbody = document.getElementById("planTable");
      tbody.innerHTML = "";
      const sorted = [...plan].sort((a, b) =>
        a.allocTime - b.allocTime || a.offsetBytes - b.offsetBytes ||
        a.name.localeCompare(b.name));
      for (const buffer of sorted) {
        const tr = document.createElement("tr");
        const endByte = buffer.offsetBytes + bitsToBytes(buffer.extentBits);
        const cells = [
          [buffer.name, "name"],
          [formatBits(buffer.extentBits), ""],
          [formatBytes(buffer.offsetBytes), ""],
          [`${buffer.allocTime} -> ${buffer.freeTime}`, ""],
          [formatBytes(endByte), ""]
        ];
        for (const [value, className] of cells) {
          const td = document.createElement("td");
          td.textContent = value;
          if (className) td.className = className;
          tr.append(td);
        }
        tbody.append(tr);
      }
    }

    function renderUtilChart(result, plan) {
      const chart = document.getElementById("utilChart");
      const width = chart.parentElement.clientWidth;
      chart.innerHTML = "";

      const minTime = Math.min(...plan.map(buffer => buffer.allocTime));
      const maxTime = Math.max(...plan.map(buffer => buffer.freeTime), minTime + 1);

      const events = [];
      plan.forEach(buffer => {
        events.push({ time: buffer.allocTime, type: 'alloc', offset: buffer.offsetBytes, extent: bitsToBytes(buffer.extentBits) });
        events.push({ time: buffer.freeTime, type: 'free', offset: buffer.offsetBytes, extent: bitsToBytes(buffer.extentBits) });
      });
      events.sort((a, b) => {
        if (a.time !== b.time) return a.time - b.time;
        return a.type === 'alloc' ? -1 : 1;
      });

      const activeRanges = [];
      const utilPoints = [];
      let currentTime = minTime;

      const mergeRanges = () => {
        if (activeRanges.length === 0) return 0;
        activeRanges.sort((a, b) => a.start - b.start);
        let total = 0;
        let lastEnd = activeRanges[0].start;
        for (const r of activeRanges) {
          if (r.start >= lastEnd) {
            total += r.end - r.start;
            lastEnd = r.end;
          } else if (r.end > lastEnd) {
            total += r.end - lastEnd;
            lastEnd = r.end;
          }
        }
        return total;
      };

      let i = 0;
      while (i < events.length) {
        const evt = events[i];
        if (evt.time > currentTime) {
          utilPoints.push({ time: currentTime, bytes: mergeRanges() });
          currentTime = evt.time;
        }
        const sameTimeEvts = [];
        while (i < events.length && events[i].time === currentTime) {
          sameTimeEvts.push(events[i]);
          i++;
        }
        sameTimeEvts.filter(e => e.type === 'alloc').forEach(e => {
          activeRanges.push({ start: e.offset, end: e.offset + e.extent });
        });
        utilPoints.push({ time: currentTime, bytes: mergeRanges() });
        sameTimeEvts.filter(e => e.type === 'free').forEach(e => {
          const idx = activeRanges.findIndex(r => r.start === e.offset && r.end === e.offset + e.extent);
          if (idx !== -1) activeRanges.splice(idx, 1);
        });
      }
      utilPoints.push({ time: maxTime, bytes: 0 });

      const capacityBits = Number(result.capacity_bits ?? result.capacityBits ?? 0);
      const capacityBytes = bitsToBytes(capacityBits);
      const utilToPercent = bytes => (bytes / capacityBytes) * 100;

      const peakUtil = Math.max(...utilPoints.map(p => p.bytes), 1);
      const peakPercent = utilToPercent(peakUtil);
      const targetYMax = Math.max(peakPercent * 2, Math.ceil(peakPercent / 5) * 5);
      const yMax = Math.min(100, Math.max(10, targetYMax));

      const height = 550;
      const margin = { top: 30, right: 45, bottom: 50, left: 70 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      chart.setAttribute("width", width);
      chart.setAttribute("height", height);

      const x = time => margin.left + ((time - minTime) / Math.max(1, maxTime - minTime)) * innerWidth;
      const y = percent => margin.top + innerHeight - (percent / yMax) * innerHeight;

      const group = element("g", {});

      const numTicks = Math.min(Math.max(Math.ceil(yMax / 5), 2), 5);
      for (let i = 0; i <= numTicks; ++i) {
        const percent = (yMax / numTicks) * i;
        group.append(element("line", {
          class: "util-hgridline",
          x1: margin.left,
          y1: y(percent),
          x2: width - margin.right,
          y2: y(percent),
          stroke: "#e5e5e5",
          "stroke-width": 1,
          "stroke-dasharray": "4,4"
        }));
        const label = element("text", {
          x: margin.left - 8,
          y: y(percent) + 4,
          "text-anchor": "end",
          fill: "#666",
          "font-size": 11
        });
        label.textContent = `${Math.round(percent)}%`;
        group.append(label);
      }

      for (const tick of [minTime, Math.round((minTime + maxTime) / 2), maxTime]) {
        group.append(element("line", {
          class: "util-vgridline",
          x1: x(tick),
          y1: margin.top,
          x2: x(tick),
          y2: height - margin.bottom,
          stroke: "#e5e5e5",
          "stroke-width": 1,
          "stroke-dasharray": "4,4"
        }));
        const label = element("text", {
          x: x(tick),
          y: height - margin.bottom + 20,
          "text-anchor": "middle",
          fill: "#666",
          "font-size": 11
        });
        label.textContent = tick;
        group.append(label);
      }

      if (utilPoints.length > 1 && capacityBytes > 0) {
        const pathD = [];
        for (let i = 0; i < utilPoints.length - 1; i++) {
          const p1 = utilPoints[i];
          const p2 = utilPoints[i + 1];
          pathD.push(`${i === 0 ? "M" : "L"} ${x(p1.time)} ${y(utilToPercent(p1.bytes))}`);
          pathD.push(`L ${x(p2.time)} ${y(utilToPercent(p1.bytes))}`);
        }
        const lastP = utilPoints[utilPoints.length - 1];
        pathD.push(`L ${x(lastP.time)} ${y(utilToPercent(lastP.bytes))}`);

        const lastPoint = utilPoints[utilPoints.length - 1];
        const firstPoint = utilPoints[0];
        const areaD = `${pathD.join(" ")} L ${x(lastPoint.time)} ${y(0)} L ${x(firstPoint.time)} ${y(0)} Z`;
        group.append(element("path", {
          class: "util-area",
          d: areaD,
          fill: "rgba(255,99,71,0.15)"
        }));

        group.append(element("path", {
          class: "util-line",
          d: pathD.join(" "),
          fill: "none",
          stroke: "rgba(255,99,71,0.85)",
          "stroke-width": "2.5",
          "stroke-linecap": "round",
          "stroke-linejoin": "round"
        }));

        const peakUtil = Math.max(...utilPoints.map(p => p.bytes));
        const avgUtil = utilPoints.reduce((sum, p) => sum + p.bytes, 0) / utilPoints.length;
        const peakPercent = utilToPercent(peakUtil);
        const avgPercent = utilToPercent(avgUtil);

        const peakLabel = element("text", {
          class: "util-label",
          x: width - margin.right - 8,
          y: margin.top + 18,
          "text-anchor": "end",
          fill: "rgba(255,99,71,0.85)",
          "font-size": 12,
          "font-weight": "bold"
        });
        peakLabel.textContent = `${peakPercent.toFixed(1)}% peak`;
        group.append(peakLabel);

        const avgLabel = element("text", {
          class: "util-label",
          x: width - margin.right - 8,
          y: margin.top + 36,
          "text-anchor": "end",
          fill: "rgba(255,99,71,0.6)",
          "font-size": 11
        });
        avgLabel.textContent = `${avgPercent.toFixed(1)}% avg`;
        group.append(avgLabel);
      }

      const yAxisLabel = element("text", {
        x: 8,
        y: height / 2,
        "text-anchor": "middle",
        fill: "#333",
        "font-size": 12,
        transform: `rotate(-90, 8, ${height / 2})`
      });
      yAxisLabel.textContent = "UB Utilization";
      group.append(yAxisLabel);

      const xAxisLabel = element("text", {
        x: width / 2,
        y: height - 8,
        "text-anchor": "middle",
        fill: "#333",
        "font-size": 12
      });
      xAxisLabel.textContent = "PlanMemory operation time";
      group.append(xAxisLabel);

      chart.append(group);
    }

    function element(name, attributes) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attributes)) {
        node.setAttribute(key, value);
      }
      return node;
    }

    function bitsToBytes(bits) {
      return Math.ceil(Number(bits || 0) / 8);
    }

    function formatBits(bits) {
      const value = Number(bits || 0);
      if (value >= 8 * 1024 * 1024) return `${(value / 8 / 1024 / 1024).toFixed(2)} MiB`;
      if (value >= 8 * 1024) return `${(value / 8 / 1024).toFixed(2)} KiB`;
      return `${value} bits`;
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(2)} MiB`;
      if (value >= 1024) return `${(value / 1024).toFixed(2)} KiB`;
      return `${Math.round(value)} B`;
    }

    render(sample);
  </script>
</body>
</html>
