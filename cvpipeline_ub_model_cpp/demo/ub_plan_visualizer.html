<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CVPipeline UB Plan Visualizer</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5d687a;
      --line: #d8dee8;
      --accent: #167c80;
      --danger: #c0392b;
      --ok: #237a45;
      --warn: #9a6a00;
      --track: #ecf0f4;
      --shadow: 0 10px 28px rgba(24, 35, 50, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 20px auto 36px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      max-width: 860px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 340px;
    }

    button, .file-button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
      min-height: 36px;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    input[type="file"] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      font-size: 15px;
      line-height: 1.2;
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 74px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric .value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .metric.ok .value { color: var(--ok); }
    .metric.danger .value { color: var(--danger); }
    .metric.warn .value { color: var(--warn); }

    .capacity {
      padding: 0 14px 14px;
    }

    .capacity-track {
      height: 16px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .capacity-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
    }

    .capacity-fill.overflow { background: var(--danger); }

    .kv {
      display: grid;
      grid-template-columns: minmax(120px, 38%) 1fr;
      gap: 6px 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
    }

    .kv div:nth-child(odd) { color: var(--muted); }
    .kv div:nth-child(even) {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .input-panel textarea {
      display: block;
      width: calc(100% - 28px);
      height: 240px;
      margin: 14px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      background: #fbfcfd;
    }

    .input-actions {
      display: flex;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .status {
      color: var(--muted);
      padding: 0 14px 14px;
      min-height: 24px;
    }

    .viz {
      padding: 14px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 220px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    .chart-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    svg#chart {
      display: block;
      min-width: 760px;
      width: 100%;
      height: 480px;
    }

    /* Utilization chart: taller, grows with its own width attribute. */
    svg#utilChart {
      display: block;
      width: 100%;
      height: 550px;
    }

    .util-label { font-size: 12px; font-weight: bold; }

    .axis text {
      fill: var(--muted);
      font-size: 11px;
    }

    .axis line, .axis path, .gridline {
      stroke: var(--line);
      shape-rendering: crispEdges;
    }

    .buffer-rect {
      stroke: rgba(23, 32, 51, 0.35);
      stroke-width: 1;
    }

    .buffer-label {
      fill: #111827;
      font-size: 11px;
      pointer-events: none;
    }

    .peak-line {
      stroke: var(--danger);
      stroke-width: 2;
      stroke-dasharray: 6 4;
    }

    .peak-label {
      fill: var(--danger);
      font-size: 12px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #f8fafc;
      position: sticky;
      top: 0;
    }

    td.name {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .table-wrap {
      max-height: 320px;
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      main { width: min(100vw - 20px, 900px); }
      header { display: block; }
      .toolbar { justify-content: flex-start; margin-top: 12px; min-width: 0; }
      .grid { grid-template-columns: 1fr; }
      svg { height: 430px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CVPipeline UB Plan Visualizer</h1>
        <div class="subtitle">
          Inspect the exact local UB plan from the lightweight model: peak,
          capacity, buffer offsets, and live intervals.
        </div>
      </div>
      <div class="toolbar">
        <label class="file-button" title="Load a JSON file produced by plan_precvpipeline_ub.py">
          Open JSON
          <input id="fileInput" type="file" accept=".json,application/json,text/plain">
        </label>
        <button id="sampleButton" type="button">Sample</button>
        <button id="clearButton" type="button">Clear</button>
      </div>
    </header>

    <section class="grid">
      <aside>
        <section class="panel">
          <h2>Summary</h2>
          <div class="summary" id="summary"></div>
          <div class="capacity">
            <div class="capacity-track" title="required bits over capacity bits">
              <div class="capacity-fill" id="capacityFill"></div>
            </div>
          </div>
          <div class="kv" id="metadata"></div>
        </section>

        <section class="panel input-panel" style="margin-top: 16px;">
          <h2>Input</h2>
          <textarea id="inputText" spellcheck="false" placeholder="Paste JSON from plan_precvpipeline_ub.py --format=json, or paste the text table output."></textarea>
          <div class="input-actions">
            <button id="renderButton" class="primary" type="button">Render</button>
            <button id="copySampleButton" type="button">Copy Sample</button>
          </div>
          <div class="status" id="status"></div>
        </section>
      </aside>

      <section>
        <section class="panel">
          <h2>UB Offset x Lifetime</h2>
          <div class="viz">
            <div class="legend" id="legend"></div>
            <div id="functionSelectorWrap" class="legend" style="display:none;">
              <label for="functionSelector" style="margin-right:6px;">Function:</label>
              <select id="functionSelector"></select>
            </div>
            <div class="chart-wrap">
              <svg id="chart" role="img" aria-label="UB memory plan chart"></svg>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top: 16px;">
          <h2>UB Utilization</h2>
          <div class="viz">
            <div class="chart-wrap">
              <svg id="utilChart" role="img" aria-label="UB utilization chart"></svg>
            </div>
          </div>
        </section>

        <section class="panel" style="margin-top: 16px;">
          <h2>Buffer Plan</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Function</th>
                  <th>Name</th>
                  <th>Extent</th>
                  <th>Offset</th>
                  <th>Live Range</th>
                  <th>End Byte</th>
                </tr>
              </thead>
              <tbody id="planTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const sample = {
      schema_version: 2,
      input: { pre_cvpipeline_ir: "sample/before_cvpipeline_generic.mlir" },
      options: {
        cvpipeline: {
          disable_pipelining: false,
          pipeline_depth: -1,
          enable_preload: false,
          enable_lazy_loading: false
        },
        suffix_planmemory: {
          enable_auto_multi_buffer: false,
          local_multi_buffer_strategy: "no-limit",
          mix_multi_buffer_strategy: "no-limit",
          random_seed: 0,
          restrict_inplace_as_isa: false
        }
      },
      result: {
        precision: "exact",
        status: "success",
        success: true,
        overflow: false,
        selected_seed: 0,
        restrict_inplace_as_isa: false,
        ub_peak_bits: 640,
        peak_bits: 640,
        required_bits: 768,
        capacity_bits: 1572864,
        stage_coverage: [],
        diagnostics: [],
        functions: [
          {
            source_function: "sample_kernel",
            function: "sample_kernel",
            status: "success",
            success: true,
            overflow: false,
            ub_peak_bits: 640,
            required_bits: 768,
            selected_seed: 0,
            buffers: [
              { name: "%base_0", extent_bits: 256, offset_bytes: 0, alloc_time: 8, free_time: 14 },
              { name: "%base_1", extent_bits: 128, offset_bytes: 32, alloc_time: 11, free_time: 16 },
              { name: "%base_2", extent_bits: 128, offset_bytes: 64, alloc_time: 14, free_time: 18 }
            ]
          }
        ],
        plan: [
          { function: "sample_kernel", name: "%base_0", extent_bits: 256, offset_bytes: 0, alloc_time: 8, free_time: 14 },
          { function: "sample_kernel", name: "%base_1", extent_bits: 128, offset_bytes: 32, alloc_time: 11, free_time: 16 },
          { function: "sample_kernel", name: "%base_2", extent_bits: 128, offset_bytes: 64, alloc_time: 14, free_time: 18 }
        ]
      }
    };

    const palette = [
      "#58a6a6", "#d98e4a", "#7a9c3e", "#8d6ccf", "#c95f6a",
      "#4f8bc9", "#b77b35", "#4f9d69", "#c45b94", "#6877c9",
      "#9a8b2e", "#5c9db2"
    ];

    const inputText = document.getElementById("inputText");
    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");

    document.getElementById("sampleButton").addEventListener("click", () => render(sample));
    document.getElementById("copySampleButton").addEventListener("click", () => {
      inputText.value = JSON.stringify(sample, null, 2);
      status.textContent = "Sample JSON copied into the input box.";
    });
    document.getElementById("clearButton").addEventListener("click", clearView);
    document.getElementById("renderButton").addEventListener("click", () => {
      try {
        render(parseInput(inputText.value));
      } catch (error) {
        status.textContent = error.message;
      }
    });
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;
      inputText.value = await file.text();
      try {
        render(parseInput(inputText.value));
      } catch (error) {
        status.textContent = error.message;
      }
    });

    function parseInput(text) {
      const trimmed = text.trim();
      if (!trimmed) throw new Error("Paste JSON or text output first.");
      if (trimmed.startsWith("{")) return JSON.parse(trimmed);
      return { schema_version: 2, result: parseTextOutput(trimmed) };
    }

    function parseTextOutput(text) {
      const lines = text.split(/\r?\n/);
      const result = { functions: [], plan: [] };
      const header = "function\tname\textent_bits\toffset_bytes\talloc_time\tfree_time";
      const legacyHeader = "name\textent_bits\toffset_bytes\talloc_time\tfree_time";
      let inPlan = false;
      const groups = {};
      const order = [];
      const flat = [];
      for (const line of lines) {
        if (!line.trim()) continue;
        const parts = line.split("\t");
        if (parts.join("\t") === header || parts.join("\t") === legacyHeader) {
          inPlan = true;
          continue;
        }
        if (inPlan) {
          if (parts.length < 6) continue;
          const [fn, name, extent, offset, alloc, free] = parts;
          const buf = { name, extent_bits: Number(extent), offset_bytes: Number(offset),
                        alloc_time: Number(alloc), free_time: Number(free) };
          flat.push(Object.assign({ function: fn }, buf));
          if (!groups[fn]) { groups[fn] = []; order.push(fn); }
          groups[fn].push(buf);
          continue;
        }
        if (parts.length >= 2) {
          const key = parts[0];
          const value = parts.slice(1).join("\t");
          if (["peak_bits", "required_bits", "capacity_bits", "selected_seed",
               "function_count", "diagnostic_count"].includes(key)) {
            result[key] = Number(value);
          } else if (["success", "overflow", "restrict_inplace_as_isa"].includes(key)) {
            result[key] = value === "true";
          } else {
            result[key] = value;
          }
        }
      }
      if (result.ub_peak_bits == null && result.peak_bits != null)
        result.ub_peak_bits = result.peak_bits;
      const fnStatus = result.overflow ? "overflow" : "success";
      result.functions = order.map(name => ({
        source_function: name, function: name, status: fnStatus,
        ub_peak_bits: result.ub_peak_bits, required_bits: result.required_bits,
        selected_seed: result.selected_seed, buffers: groups[name]
      }));
      result.plan = flat;
      return result;
    }

    function normalizeFunction(fn, fallback) {
      const buffers = (fn.buffers || []).map((b, i) => bufferToView(b, i, fn.function || fn.name));
      return {
        name: String(fn.function ?? fn.name ?? ""),
        source: String(fn.source_function ?? fn.function ?? ""),
        status: String(fn.status ?? fallback.status ?? ""),
        peakBits: Number(fn.ub_peak_bits ?? fn.peak_bits ?? fn.peakBits ?? fallback.modulePeakBits ?? 0),
        requiredBits: Number(fn.required_bits ?? fn.requiredBits ?? fallback.moduleRequiredBits ?? 0),
        seed: fn.selected_seed,
        buffers
      };
    }

    function bufferToView(buffer, index, functionName) {
      return {
        function: String(buffer.function ?? functionName ?? ""),
        name: String(buffer.name ?? `buffer_${index}`),
        extentBits: Number(buffer.extent_bits ?? buffer.extentBits ?? 0),
        offsetBytes: Number(buffer.offset_bytes ?? buffer.offsetBytes ?? 0),
        allocTime: Number(buffer.alloc_time ?? buffer.allocTime ?? 0),
        freeTime: Number(buffer.free_time ?? buffer.freeTime ?? 0)
      };
    }

    function normalize(data) {
      const result = data.result || data;
      const modulePeakBits = Number(result.ub_peak_bits ?? result.peak_bits ?? result.peakBits ?? 0);
      const moduleRequiredBits = Number(result.required_bits ?? result.requiredBits ?? 0);
      const capacityBits = Number(result.capacity_bits ?? result.capacityBits ?? 0);
      const status = result.status ||
        (result.overflow ? "overflow" : (result.success !== false ? "success" : "blocked"));
      const fallback = { status, modulePeakBits, moduleRequiredBits };

      let functions;
      if (Array.isArray(result.functions) && result.functions.length > 0 &&
          result.functions[0] && Array.isArray(result.functions[0].buffers)) {
        functions = result.functions.map(fn => normalizeFunction(fn, fallback));
      } else {
        const flat = Array.isArray(result.plan) ? result.plan : [];
        const groups = {};
        const order = [];
        flat.forEach((buffer, index) => {
          const name = String(buffer.function ?? "(function)");
          if (!groups[name]) { groups[name] = []; order.push(name); }
          groups[name].push(bufferToView(buffer, index, name));
        });
        functions = order.map(name => ({
          name, source: name, status,
          peakBits: modulePeakBits, requiredBits: moduleRequiredBits,
          seed: result.selected_seed, buffers: groups[name]
        }));
      }
      const totalBuffers = functions.reduce((n, fn) => n + fn.buffers.length, 0);
      if (totalBuffers === 0)
        throw new Error("Input does not contain any planned buffers.");
      return { data, result, functions, modulePeakBits, moduleRequiredBits,
               capacityBits, status, precision: result.precision ?? "" };
    }

    let currentModel = null;
    let selectedFunction = null;

    function render(data) {
      const model = normalize(data);
      currentModel = model;
      // Default to the function whose peak drives the module max; this keeps the
      // chart honest (module max is never the sum of per-function extents).
      let chosen = model.functions[0];
      for (const fn of model.functions)
        if (fn.peakBits > (chosen.peakBits || 0)) chosen = fn;
      selectedFunction = chosen.name;
      renderSummary(model);
      renderFunctionSelector(model);
      renderChart(model, selectedFunction);
      renderUtilChart(model, selectedFunction);
      renderTable(model);
      inputText.value = JSON.stringify(data, null, 2);
      const totalBuffers = model.functions.reduce((n, fn) => n + fn.buffers.length, 0);
      status.textContent = `Rendered ${totalBuffers} buffers across ${model.functions.length} function(s).`;
    }

    function renderFunctionSelector(model) {
      const wrap = document.getElementById("functionSelectorWrap");
      const select = document.getElementById("functionSelector");
      select.innerHTML = "";
      if (model.functions.length <= 1) {
        wrap.style.display = "none";
        return;
      }
      wrap.style.display = "";
      model.functions.forEach(fn => {
        const opt = document.createElement("option");
        opt.value = fn.name;
        opt.textContent = `${fn.name} (peak ${formatBits(fn.peakBits)})`;
        select.append(opt);
      });
      select.value = selectedFunction;
    }

    document.getElementById("functionSelector").addEventListener("change", () => {
      selectedFunction = document.getElementById("functionSelector").value;
      if (currentModel) {
        renderChart(currentModel, selectedFunction);
        renderUtilChart(currentModel, selectedFunction);
      }
    });

    function clearView() {
      inputText.value = "";
      status.textContent = "";
      document.getElementById("summary").innerHTML = "";
      document.getElementById("metadata").innerHTML = "";
      document.getElementById("legend").innerHTML = "";
      document.getElementById("planTable").innerHTML = "";
      document.getElementById("capacityFill").style.width = "0%";
      document.getElementById("chart").innerHTML = "";
      const utilChart = document.getElementById("utilChart");
      if (utilChart) utilChart.innerHTML = "";
      const wrap = document.getElementById("functionSelectorWrap");
      if (wrap) wrap.style.display = "none";
      currentModel = null;
      selectedFunction = null;
    }

    function renderSummary(model) {
      const { result, functions, modulePeakBits, moduleRequiredBits, capacityBits, status } = model;
      const overflow = status === "overflow";
      const tone = overflow ? "danger" : status === "success" ? "ok" : "warn";
      const label = overflow ? "Overflow" : status === "success" ? "Success" : "Blocked";
      const usage = capacityBits > 0 ? moduleRequiredBits / capacityBits : 0;
      const totalBuffers = functions.reduce((n, fn) => n + fn.buffers.length, 0);
      const summary = document.getElementById("summary");
      summary.innerHTML = "";
      summary.append(
        metric("Status", label, tone),
        metric("Peak (module max)", formatBits(modulePeakBits), overflow ? "danger" : "ok"),
        metric("Required", formatBits(moduleRequiredBits), overflow ? "danger" : ""),
        metric("Functions", String(functions.length), "")
      );
      const fill = document.getElementById("capacityFill");
      fill.style.width = `${Math.min(100, Math.max(0, usage * 100))}%`;
      fill.classList.toggle("overflow", overflow);

      const inputPath = model.data.input && model.data.input.pre_cvpipeline_ir
        ? model.data.input.pre_cvpipeline_ir : "";
      const metadata = document.getElementById("metadata");
      metadata.innerHTML = "";
      const rows = [
        ["Precision", model.precision ?? ""],
        ["Buffers", String(totalBuffers)],
        ["Seed", result.selected_seed ?? ""],
        ["Restrict Inplace", result.restrict_inplace_as_isa ?? ""],
        ["Capacity", formatBits(capacityBits)],
        ["Usage", capacityBits > 0 ? `${(usage * 100).toFixed(4)}%` : ""],
        ["Input", inputPath]
      ];
      for (const [key, value] of rows) {
        const k = document.createElement("div");
        const v = document.createElement("div");
        k.textContent = key;
        v.textContent = String(value);
        metadata.append(k, v);
      }
    }

    function metric(label, value, tone) {
      const node = document.createElement("div");
      node.className = `metric ${tone || ""}`;
      const labelNode = document.createElement("div");
      labelNode.className = "label";
      labelNode.textContent = label;
      const valueNode = document.createElement("div");
      valueNode.className = "value";
      valueNode.textContent = value;
      node.append(labelNode, valueNode);
      return node;
    }

    function renderChart(model, functionName) {
      const fn = model.functions.find(f => f.name === functionName) || model.functions[0];
      const plan = fn.buffers;
      const svg = document.getElementById("chart");
      svg.innerHTML = "";
      const width = Math.max(760, svg.clientWidth || 920);
      const height = 480;
      const margin = { top: 24, right: 28, bottom: 46, left: 70 };
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const minTime = Math.min(...plan.map(buffer => buffer.allocTime));
      const maxTime = Math.max(...plan.map(buffer => buffer.freeTime), minTime + 1);
      const maxEndByte = Math.max(...plan.map(buffer => buffer.offsetBytes + bitsToBytes(buffer.extentBits)), 1);
      // The chart's extent uses the module max (not a sum across functions).
      const yMax = Math.max(maxEndByte, bitsToBytes(model.modulePeakBits),
                            bitsToBytes(model.moduleRequiredBits), 1);
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const x = time => margin.left + ((time - minTime) / Math.max(1, maxTime - minTime)) * innerWidth;
      const y = byte => margin.top + innerHeight - (byte / yMax) * innerHeight;

      const group = element("g", {});
      svg.append(group);

      for (let index = 0; index <= 5; ++index) {
        const byte = (yMax / 5) * index;
        group.append(element("line", {
          class: "gridline",
          x1: margin.left,
          y1: y(byte),
          x2: width - margin.right,
          y2: y(byte)
        }));
        const label = element("text", {
          x: margin.left - 10,
          y: y(byte) + 4,
          "text-anchor": "end",
          fill: "var(--muted)",
          "font-size": 11
        });
        label.textContent = formatBytes(byte);
        group.append(label);
      }

      for (let index = 0; index <= 6; ++index) {
        const time = minTime + ((maxTime - minTime) / 6) * index;
        group.append(element("line", {
          class: "gridline",
          x1: x(time),
          y1: margin.top,
          x2: x(time),
          y2: margin.top + innerHeight
        }));
        const label = element("text", {
          x: x(time),
          y: height - 18,
          "text-anchor": "middle",
          fill: "var(--muted)",
          "font-size": 11
        });
        label.textContent = String(Math.round(time));
        group.append(label);
      }

      const yAxis = element("text", {
        x: 18,
        y: margin.top + innerHeight / 2,
        transform: `rotate(-90 18 ${margin.top + innerHeight / 2})`,
        "text-anchor": "middle",
        fill: "var(--muted)",
        "font-size": 12
      });
      yAxis.textContent = "UB offset";
      group.append(yAxis);
      const xAxis = element("text", {
        x: margin.left + innerWidth / 2,
        y: height - 4,
        "text-anchor": "middle",
        fill: "var(--muted)",
        "font-size": 12
      });
      xAxis.textContent = "PlanMemory operation time";
      group.append(xAxis);

      plan.forEach((buffer, index) => {
        const top = buffer.offsetBytes + bitsToBytes(buffer.extentBits);
        const rect = element("rect", {
          class: "buffer-rect",
          x: x(buffer.allocTime),
          y: y(top),
          width: Math.max(3, x(buffer.freeTime) - x(buffer.allocTime)),
          height: Math.max(3, y(buffer.offsetBytes) - y(top)),
          rx: 3,
          fill: palette[index % palette.length]
        });
        rect.append(element("title", {}));
        rect.querySelector("title").textContent =
          `${fn.name} :: ${buffer.name}\n${formatBits(buffer.extentBits)} at ${formatBytes(buffer.offsetBytes)}\n${buffer.allocTime} -> ${buffer.freeTime}`;
        group.append(rect);

        if (x(buffer.freeTime) - x(buffer.allocTime) > 54 &&
            y(buffer.offsetBytes) - y(top) > 16) {
          const label = element("text", {
            class: "buffer-label",
            x: x(buffer.allocTime) + 5,
            y: y(top) + 14
          });
          label.textContent = buffer.name;
          group.append(label);
        }
      });

      // Module-max peak line (the report's headline figure, never a cross-function sum).
      const peakByte = bitsToBytes(model.modulePeakBits || model.moduleRequiredBits);
      group.append(element("line", {
        class: "peak-line",
        x1: margin.left,
        y1: y(peakByte),
        x2: width - margin.right,
        y2: y(peakByte)
      }));
      const peakLabel = element("text", {
        class: "peak-label",
        x: width - margin.right - 4,
        y: y(peakByte) - 6,
        "text-anchor": "end"
      });
      peakLabel.textContent = `module peak ${formatBits(model.modulePeakBits)}`;
      group.append(peakLabel);

      const legend = document.getElementById("legend");
      legend.innerHTML = "";
      const legendPrefix = model.functions.length > 1 ? `${fn.name}: ` : "";
      plan.slice(0, 24).forEach((buffer, index) => {
        const item = document.createElement("span");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = palette[index % palette.length];
        const name = document.createElement("span");
        name.textContent = `${legendPrefix}${buffer.name}`;
        item.append(swatch, name);
        legend.append(item);
      });
      if (plan.length > 24) {
        const more = document.createElement("span");
        more.textContent = `+${plan.length - 24} more`;
        legend.append(more);
      }
    }

    // UB utilization over PlanMemory time: high-water mark of active buffer
    // end-bytes for the selected function, expressed as % of UB capacity.
    // Ported from the remote branch and adapted to the per-function contract:
    // the sweep runs over the selected function's buffers (consistent with the
    // main chart), while the denominator is the module UB capacity.
    function renderUtilChart(model, functionName) {
      const chart = document.getElementById("utilChart");
      if (!chart) return;
      chart.innerHTML = "";

      const fn = model.functions.find(f => f.name === functionName) || model.functions[0];
      const plan = fn ? fn.buffers : [];
      if (plan.length === 0) return;

      const containerWidth = chart.parentElement.clientWidth || 920;
      const width = Math.max(760, containerWidth);
      const height = 550;
      const margin = { top: 30, right: 45, bottom: 50, left: 70 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const minTime = Math.min(...plan.map(b => b.allocTime));
      const maxTime = Math.max(...plan.map(b => b.freeTime), minTime + 1);

      // Event sweep: alloc adds an active range, free removes it; the running
      // max of active end-bytes is the instantaneous high-water mark.
      const events = [];
      plan.forEach(buffer => {
        const extentBytes = bitsToBytes(buffer.extentBits);
        events.push({ time: buffer.allocTime, type: "alloc",
                      start: buffer.offsetBytes, end: buffer.offsetBytes + extentBytes });
        events.push({ time: buffer.freeTime, type: "free",
                      start: buffer.offsetBytes, end: buffer.offsetBytes + extentBytes });
      });
      events.sort((a, b) => a.time - b.time || (a.type === "alloc" ? -1 : 1));

      const activeRanges = [];
      const utilPoints = [];
      const maxEndByteAtTime = () =>
        activeRanges.length === 0 ? 0 : Math.max(...activeRanges.map(r => r.end));

      let currentTime = minTime;
      let i = 0;
      while (i < events.length) {
        const evt = events[i];
        if (evt.time > currentTime) {
          utilPoints.push({ time: currentTime, bytes: maxEndByteAtTime() });
          currentTime = evt.time;
        }
        const sameTimeEvts = [];
        while (i < events.length && events[i].time === currentTime) {
          sameTimeEvts.push(events[i]);
          i++;
        }
        sameTimeEvts.filter(e => e.type === "alloc")
          .forEach(e => activeRanges.push({ start: e.start, end: e.end }));
        utilPoints.push({ time: currentTime, bytes: maxEndByteAtTime() });
        sameTimeEvts.filter(e => e.type === "free").forEach(e => {
          const idx = activeRanges.findIndex(r => r.start === e.start && r.end === e.end);
          if (idx !== -1) activeRanges.splice(idx, 1);
        });
      }
      utilPoints.push({ time: maxTime, bytes: 0 });

      const capacityBytes = bitsToBytes(model.capacityBits || 0);
      if (capacityBytes <= 0) return; // cannot scale without a capacity
      const utilToPercent = bytes => (bytes / capacityBytes) * 100;

      const peakBytes = Math.max(...utilPoints.map(p => p.bytes));
      const avgBytes = utilPoints.reduce((sum, p) => sum + p.bytes, 0) / utilPoints.length;
      const peakPercent = utilToPercent(peakBytes);
      const avgPercent = utilToPercent(avgBytes);

      // Y axis: zoom around the peak but never exceed 100%.
      const targetYMax = Math.max(peakPercent * 2, Math.ceil(peakPercent / 5) * 5);
      const yMax = Math.min(100, Math.max(10, targetYMax));

      chart.setAttribute("width", width);
      chart.setAttribute("height", height);
      chart.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const x = time => margin.left + ((time - minTime) / Math.max(1, maxTime - minTime)) * innerWidth;
      const y = percent => margin.top + innerHeight - (percent / yMax) * innerHeight;

      const group = element("g", {});

      const numTicks = Math.min(Math.max(Math.ceil(yMax / 5), 2), 5);
      for (let t = 0; t <= numTicks; ++t) {
        const percent = (yMax / numTicks) * t;
        group.append(element("line", {
          x1: margin.left, y1: y(percent), x2: width - margin.right, y2: y(percent),
          stroke: "#e5e5e5", "stroke-width": 1, "stroke-dasharray": "4,4"
        }));
        const label = element("text", {
          x: margin.left - 8, y: y(percent) + 4, "text-anchor": "end",
          fill: "#666", "font-size": 11
        });
        label.textContent = `${Math.round(percent)}%`;
        group.append(label);
      }

      for (const tick of [minTime, Math.round((minTime + maxTime) / 2), maxTime]) {
        group.append(element("line", {
          x1: x(tick), y1: margin.top, x2: x(tick), y2: height - margin.bottom,
          stroke: "#e5e5e5", "stroke-width": 1, "stroke-dasharray": "4,4"
        }));
        const label = element("text", {
          x: x(tick), y: height - margin.bottom + 20, "text-anchor": "middle",
          fill: "#666", "font-size": 11
        });
        label.textContent = tick;
        group.append(label);
      }

      if (utilPoints.length > 1) {
        const pathD = [];
        for (let p = 0; p < utilPoints.length - 1; p++) {
          const p1 = utilPoints[p];
          const p2 = utilPoints[p + 1];
          pathD.push(`${p === 0 ? "M" : "L"} ${x(p1.time)} ${y(utilToPercent(p1.bytes))}`);
          pathD.push(`L ${x(p2.time)} ${y(utilToPercent(p1.bytes))}`);
        }
        const lastP = utilPoints[utilPoints.length - 1];
        const firstP = utilPoints[0];
        const areaD = `${pathD.join(" ")} L ${x(lastP.time)} ${y(0)} L ${x(firstP.time)} ${y(0)} Z`;
        group.append(element("path", { d: areaD, fill: "rgba(255,99,71,0.15)" }));
        group.append(element("path", {
          d: pathD.join(" "), fill: "none",
          stroke: "rgba(255,99,71,0.85)", "stroke-width": "2.5",
          "stroke-linecap": "round", "stroke-linejoin": "round"
        }));

        const peakLabel = element("text", {
          class: "util-label", x: width - margin.right - 8, y: margin.top + 18,
          "text-anchor": "end", fill: "rgba(255,99,71,0.85)"
        });
        peakLabel.textContent = `${peakPercent.toFixed(1)}% peak`;
        group.append(peakLabel);

        const avgLabel = element("text", {
          x: width - margin.right - 8, y: margin.top + 36,
          "text-anchor": "end", fill: "rgba(255,99,71,0.6)", "font-size": 11
        });
        avgLabel.textContent = `${avgPercent.toFixed(1)}% avg`;
        group.append(avgLabel);
      }

      const yAxisLabel = element("text", {
        x: 8, y: height / 2, "text-anchor": "middle", fill: "#333", "font-size": 12,
        transform: `rotate(-90, 8, ${height / 2})`
      });
      yAxisLabel.textContent = `UB utilization (${fn.name})`;
      group.append(yAxisLabel);

      const xAxisLabel = element("text", {
        x: width / 2, y: height - 8, "text-anchor": "middle", fill: "#333", "font-size": 12
      });
      xAxisLabel.textContent = "PlanMemory operation time";
      group.append(xAxisLabel);

      chart.append(group);
    }

    function renderTable(model) {
      const tbody = document.getElementById("planTable");
      tbody.innerHTML = "";
      for (const fn of model.functions) {
        const sorted = [...fn.buffers].sort((a, b) =>
          a.allocTime - b.allocTime || a.offsetBytes - b.offsetBytes ||
          a.name.localeCompare(b.name));
        for (const buffer of sorted) {
          const tr = document.createElement("tr");
          const endByte = buffer.offsetBytes + bitsToBytes(buffer.extentBits);
          const cells = [
            [fn.name, "name"],
            [buffer.name, "name"],
            [formatBits(buffer.extentBits), ""],
            [formatBytes(buffer.offsetBytes), ""],
            [`${buffer.allocTime} -> ${buffer.freeTime}`, ""],
            [formatBytes(endByte), ""]
          ];
          for (const [value, className] of cells) {
            const td = document.createElement("td");
            td.textContent = value;
            if (className) td.className = className;
            tr.append(td);
          }
          tbody.append(tr);
        }
      }
    }

    function element(name, attributes) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attributes)) {
        node.setAttribute(key, value);
      }
      return node;
    }

    function bitsToBytes(bits) {
      return Math.ceil(Number(bits || 0) / 8);
    }

    function formatBits(bits) {
      const value = Number(bits || 0);
      if (value >= 8 * 1024 * 1024) return `${(value / 8 / 1024 / 1024).toFixed(2)} MiB`;
      if (value >= 8 * 1024) return `${(value / 8 / 1024).toFixed(2)} KiB`;
      return `${value} bits`;
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(2)} MiB`;
      if (value >= 1024) return `${(value / 1024).toFixed(2)} KiB`;
      return `${Math.round(value)} B`;
    }

    render(sample);
  </script>
</body>
</html>
