name: Build ascendnpu-ir Wheels (x86_64)

on:
  push:
    tags:
      - '*'  # 任何 tag 都触发

jobs:
  # Job 1: 构建二进制文件
  build_binaries:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          # 安装构建依赖
          yum install -y clang lld ccache

          # 用 pip 安装 ninja（版本新）
          /opt/python/cp310-cp310/bin/python3 -m pip install ninja

          # 复制 ninja 到 /usr/local/bin
          cp /opt/_internal/cpython-3.10.20/bin/ninja /usr/local/bin/
          chmod +x /usr/local/bin/ninja

      - name: Download and extract CANN toolkit
        run: |
          curl -LO https://ascend-repo.obs.cn-east-2.myhuaweicloud.com/CANN/CANN%209.0.0/Ascend-cann-toolkit_9.0.0_linux-x86_64.run
          bash ./Ascend-cann-toolkit_9.0.0_linux-x86_64.run --noexec --extract=cann900
          bash cann900/run_package/cann-bisheng-compiler_*.run --noexec --extract=bisheng_toolkit
          echo "--- 验证 bisheng compiler ---"
          test -f bisheng_toolkit/bisheng_compiler/bin/bisheng || echo "ERROR: bisheng not found"
          bisheng_toolkit/bisheng_compiler/bin/bisheng --version

      - name: Verify tools
        run: |
          echo "--- 验证工具 ---"
          which cmake && cmake --version
          which ninja && ninja --version
          which clang && clang --version
          which lld && ld.lld --version

      - name: Initialize submodules
        run: |
          git submodule update --init --depth 1 third-party/llvm-project
          git submodule update --init --depth 1 third-party/torch-mlir

      - name: Restore LLVM build directory cache
        uses: actions/cache/restore@v4
        with:
          path: build/
          key: llvm-build-x86_64-${{ hashFiles('.gitmodules') }}-${{ hashFiles('build-tools/patches/**/*.patch') }}

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-x86_64-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            ccache-x86_64-

      - name: Build ascendnpu-ir binaries
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          chmod +x build-tools/build.sh
          build-tools/build.sh -o ./build \
            --add-cmake-options="-DCMAKE_LINKER=LLD" \
            --add-cmake-options="-DLLVM_ENABLE_LLD=ON" \
            -t \
            --bisheng-compiler=$GITHUB_WORKSPACE/bisheng_toolkit/bisheng_compiler/bin \
            --build-torch-mlir \
            --safety-options \
            --safety-ld-options \
            --skip-rpath \
            --apply-patches

      - name: Save LLVM build directory cache
        uses: actions/cache/save@v4
        with:
          path: build/
          key: llvm-build-x86_64-${{ hashFiles('.gitmodules') }}-${{ hashFiles('build-tools/patches/**/*.patch') }}

      - name: Save ccache
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-x86_64-${{ hashFiles('.gitmodules') }}

      - name: Prepare A3 artifacts for upload
        run: |
          mkdir -p bishengir-output/bin
          cp build/install/bin/bishengir-compile bishengir-output/bin/
          cp build/install/bin/bishengir-opt bishengir-output/bin/
          # 如果有 lib 文件也复制
          if [ -d build/install/lib ]; then
            mkdir -p bishengir-output/lib
            cp -r build/install/lib/* bishengir-output/lib/ 2>/dev/null || true
          fi

      - name: Upload A3 binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64
          path: bishengir-output/

      - name: Clone A5 repository
        run: |
          if [[ -d bishengir-a5-src ]]; then
            echo "A5 repository already exists, updating..."
            cd bishengir-a5-src
            git remote set-url origin https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_PASSWORD }}@gitcode.com/Ascend/AscendNPU-IR-Dev.git
            git pull
          else
            git clone https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_PASSWORD }}@gitcode.com/Ascend/AscendNPU-IR-Dev.git --depth 1 bishengir-a5-src
          fi

      - name: Initialize A5 submodules
        run: |
          cd bishengir-a5-src
          git submodule update --init --recursive --depth 1 --progress

      - name: Restore A5 LLVM build directory cache
        uses: actions/cache/restore@v4
        with:
          path: bishengir-a5-src/build-a5/
          key: llvm-build-a5-x86_64-${{ hashFiles('bishengir-a5-src/.gitmodules') }}-${{ hashFiles('bishengir-a5-src/build-tools/patches/**/*.patch') }}

      - name: Restore A5 ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache-a5
          key: ccache-a5-x86_64-${{ hashFiles('bishengir-a5-src/.gitmodules') }}
          restore-keys: |
            ccache-a5-x86_64-

      - name: Build A5 binaries
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache-a5
          cd bishengir-a5-src
          chmod +x build-tools/build.sh
          ./build-tools/build.sh \
            --add-cmake-options="-DCMAKE_LINKER=LLD" \
            --add-cmake-options="-DLLVM_ENABLE_LLD=ON" \
            -t \
            --bisheng-compiler=$GITHUB_WORKSPACE/bisheng_toolkit/bisheng_compiler/bin \
            --disable-werror \
            --disable-bishengir-werror \
            --build=./build-a5 \
            --enable-assertion \
            --build-triton \
            --fast-build \
            --safety-options \
            --safety-ld-options \
            --skip-rpath \
            --bishengir-publish \
            --apply-patches

      - name: Save A5 LLVM build directory cache
        uses: actions/cache/save@v4
        with:
          path: bishengir-a5-src/build-a5/
          key: llvm-build-a5-x86_64-${{ hashFiles('bishengir-a5-src/.gitmodules') }}-${{ hashFiles('bishengir-a5-src/build-tools/patches/**/*.patch') }}

      - name: Save A5 ccache
        uses: actions/cache/save@v4
        with:
          path: .ccache-a5
          key: ccache-a5-x86_64-${{ hashFiles('bishengir-a5-src/.gitmodules') }}

      - name: Prepare unified artifacts for upload
        run: |
          chmod +x build-tools/build.sh
          build-tools/build.sh --collect-binary bishengir-output-unified

      - name: Upload unified binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-unified
          path: bishengir-output-unified/

  # Job 2: 构建 A3 和 A3+A5 归一 wheel 包
  build_wheels:
    runs-on: ubuntu-latest
    needs: build_binaries
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Download A3 binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64
          path: bishengir-output/

      - name: Download unified binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unified
          path: bishengir-output-unified/

      - name: Determine version from git tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TAG=${TAG#v}  # 去掉前缀 v
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Python and dependencies
        run: |
          PY_VERSION=${{ matrix.python-version }}
          PYBIN_VERSION=${PY_VERSION//./}
          PYBIN=/opt/python/cp${PYBIN_VERSION}-cp${PYBIN_VERSION}
          echo "Using Python at $PYBIN"
          export PATH="$PYBIN/bin:$PATH"
          python -m pip install setuptools wheel build auditwheel

      - name: Update version in pyproject.toml
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" bishengir/python/wheel/pyproject.toml

      - name: Build A3 wheel
        run: |
          PY_VERSION=${{ matrix.python-version }}
          PYBIN_VERSION=${PY_VERSION//./}
          PYBIN=/opt/python/cp${PYBIN_VERSION}-cp${PYBIN_VERSION}
          export PATH="$PYBIN/bin:$PATH"
          chmod +x build-tools/build_wheel.sh
          build-tools/build_wheel.sh \
            --build-dir bishengir-output \
            --output-dir dist \
            --clean

      - name: Build unified wheel
        run: |
          PY_VERSION=${{ matrix.python-version }}
          PYBIN_VERSION=${PY_VERSION//./}
          PYBIN=/opt/python/cp${PYBIN_VERSION}-cp${PYBIN_VERSION}
          export PATH="$PYBIN/bin:$PATH"
          chmod +x build-tools/build_wheel.sh
          build-tools/build_wheel.sh \
            --build-dir bishengir-output-unified \
            --output-dir dist-unified \
            --clean

      - name: Upload A3 wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-cp${{ matrix.python-version }}
          path: dist/

      - name: Upload unified wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-unified-cp${{ matrix.python-version }}
          path: dist-unified/
